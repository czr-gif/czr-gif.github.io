[[columns.items]]
title = "ICME 2026 Best Paper Award"
subtitle = "Completing the Response Space: Unifying Rejection and Multi-Interval Video Grounding via Cardinality-Rectified GRPO"
date = "July 5–9, 2026"
content = "Presented the paper at IEEE ICME 2026 in Bangkok, Thailand. The work unifies irrelevant-query rejection and multi-interval temporal video grounding from the perspective of cardinality generalization and introduces CaR-GRPO; it received the conference's Best Paper Award."
tags = ["ICME 2026", "Best Paper Award", "Oral Presentation", "Temporal Video Grounding"]
images = ["/ICME2026/338A8964.JPG", "/ICME2026/2G2A5374.JPG", "/ICME2026/bpa.jpg", "/ICME2026/2G2A5383.JPG"]

[[columns.items]]
title = "ICRA 2026 Poster Presentation"
subtitle = "Guiding Vector Field Generation via Score-based Diffusion Model"
date = "June 1–5, 2026"
content = "Presented this work as a poster at IEEE ICRA 2026 in Vienna, Austria. The paper introduces the Score-Induced Guiding Vector Field (SGVF), which uses a score-based diffusion model to construct guiding vector fields directly from data distributions for unordered, multi-branch, and topologically complex paths."
tags = ["ICRA 2026", "Poster Presentation", "Guiding Vector Field", "Diffusion Model"]
images = ["/ICRA2026/poster.jpg"]

[[columns.items]]
title = "Exploring Vector Field Construction Methods for Different Types of Paths"
subtitle = "IROS 2025 Workshop Speech"
date = "October 24, 2025"
content = "This talk introduced path-tracking methods through Lie group generators and data-driven approaches, with a focus on guiding vector field design under homotopy transformations for unordered paths."
tags = ["IROS 2025 Workshop", "Speech", "Guiding Vector Field"]
images = ["/IROS2025/18877425.jpg", "/IROS2025/18886656.jpg", "/IROS2025/l.jpeg", "/IROS2025/18941684.jpg"]


[[columns.items]]
title = "Inspirations from Geocentrism"
subtitle = "Science Communicator, Westlake University Science Outreach Team"
date = "2025 – Present"
content = '''Starting with the geocentric model based on epicycle theory, this course introduces the principles of Fourier transform and its applications in music and Wi-Fi technology. It highlights a broader scientific lesson: what matters is not simply being "right" or "wrong" at a given moment, but the insight gained through the process of thinking.'''
tags = ["Science Outreach", "Fourier Transform", "Geocentrism", "WiFi"]
images = ["/ScienceCommunicator/IMG_20250516_002348_edit_89236641948874.jpg", "/ScienceCommunicator/mmexport1746612843928.jpg"]

